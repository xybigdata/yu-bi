# this file has the highest priority, if val is not blank, then will replace the config

# datasource config
datasource.ip=
datasource.port=
datasource.database=
datasource.username=
datasource.password=

# server
server.port=8080
server.address=0.0.0.0

# yubi config
yubi.address=http://127.0.0.1
yubi.send-mail=false
yubi.webdriver-path=http://127.0.0.1:4444/wd/hub
yubi.user.register=true
# 注册邮件有效期/小时, 默认48小时
yubi.register.expire-hours=
# 邀请邮件有效期/小时, 默认48小时
yubi.invite.expire-hours=
# 租户管理模式：platform-平台(默认)，team-团队
yubi.tenant-management-mode=platform
