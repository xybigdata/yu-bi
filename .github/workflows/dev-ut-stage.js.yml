# This workflow validates the current frontend baseline on the supported Node runtime.
# For more information see: https://help.github.com/actions/language-and-framework-guides/using-nodejs-with-github-actions

name: Node.js CI

on:
  push:
    branches: [ "dev" ]
  pull_request:
    branches: [ "dev" ]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [26.x]

    steps:
    - uses: actions/checkout@v4
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
        cache-dependency-path: 'frontend/package-lock.json'
    - name: Use Temurin JDK 21
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: '21'
        cache: maven
    - run: npm ci
      working-directory: ./frontend
    - run: npm run checkTs
      working-directory: ./frontend
    - run: npm run build:task
      working-directory: ./frontend
    - run: npm run build --if-present
      working-directory: ./frontend
    - run: npm run test:ci
      working-directory: ./frontend
    - run: npm run lint:css
      working-directory: ./frontend
    - run: npm run lint:style
      working-directory: ./frontend
    - run: mvn -pl server -am -DskipTests package
    - run: mvn -pl data-providers/jdbc-data-provider -am -Dtest=datart.data.provider.sql.SqlScriptRenderTest,datart.data.provider.function.SqlFunctionValidateTest -Dsurefire.failIfNoSpecifiedTests=false test
    - run: bash ./scripts/check-demo-health.sh
