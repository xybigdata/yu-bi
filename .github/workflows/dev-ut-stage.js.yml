# This workflow validates the current frontend baseline on the supported Node 24 runtime.
# For more information see: https://help.github.com/actions/language-and-framework-guides/using-nodejs-with-github-actions

name: Node.js CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js from frontend/.nvmrc
        uses: actions/setup-node@v4
        with:
          node-version-file: "frontend/.nvmrc"
          cache: "npm"
          cache-dependency-path: "frontend/package-lock.json"
      - name: Use Temurin JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - name: Verify frontend toolchain
        run: |
          npm install -g npm@11.13.0
          npm run verify:toolchain
        working-directory: ./frontend
      - run: npm ci
        working-directory: ./frontend
      - run: npm run checkTs
        working-directory: ./frontend
      - run: npm run build:task
        working-directory: ./frontend
      - run: npm run build --if-present
        working-directory: ./frontend
      - name: Report frontend build size
        run: |
          npm run build:report
          YU_BI_CHUNK_REPORT_FORMAT=json YU_BI_CHUNK_REPORT_ONLY_OVERSIZED=1 YU_BI_CHUNK_REPORT_OUTPUT=build/build-report.json npm run build:report
          YU_BI_CHUNK_REPORT_BASELINE_REPORT=build/build-report.json npm run build:report:check
        working-directory: ./frontend
      - name: Upload frontend build size report
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build-report
          path: frontend/build/build-report.json
          if-no-files-found: error
      - run: npm run test:ci
        working-directory: ./frontend
      - run: npm run lint:css
        working-directory: ./frontend
      - run: npm run lint:style
        working-directory: ./frontend
      - run: mvn -pl server -am -DskipTests package
      - run: mvn -pl data-providers/jdbc-data-provider -am -Dtest=yubi.data.provider.sql.SqlScriptRenderTest,yubi.data.provider.function.SqlFunctionValidateTest -Dsurefire.failIfNoSpecifiedTests=false test
      - run: bash ./scripts/check-demo-health.sh
