spring:
  application:
    name: yu-bi-server

  main:
    banner-mode: off

  servlet:
    multipart:
      max-file-size: 1024MB
      max-request-size: 1024MB

  web:
    resources:
      static-locations: file:${user.dir}/static/,file:${yubi.env.file-path}/
      cache:
        cachecontrol:
          cache-public: true
          no-cache: true
          no-store: false

  messages:
    basename: i18n.yubi_i18n

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
    serialization:
      FAIL_ON_EMPTY_BEANS: false
      FAIL_ON_UNWRAPPED_TYPE_IDENTIFIERS: false

  quartz:
    job-store-type: jdbc
    scheduler-name: YuBiScheduleCluster
    properties:
      org:
        quartz:
          scheduler:
            instanceName: YuBiScheduleCluster
            instanceId: AUTO
          jobStore:
            driverDelegateClass: org.quartz.impl.jdbcjobstore.StdJDBCDelegate
            tablePrefix: QRTZ_
            isClustered: true
            clusterCheckinInterval: 5000
            useProperties: true
          threadPool:
            class: org.quartz.simpl.SimpleThreadPool
            threadCount: 10
            threadPriority: 5

mybatis:
  type-aliases-package: yubi.core.entity
  configuration:
    use-generated-keys: true
    map-underscore-to-camel-case: true

logging:
  level:
    yubi:
      core:
        mappers: info
      data.provider.jdbc: info
  config: config/logback.xml

yubi:
  migration:
    enable: true

  security:
    share-download-session:
      secret: ${YUBI_SHARE_DOWNLOAD_SESSION_SECRET:}

  agent:
    workspace:
      session-lifetime-minutes: 480
      approval-lifetime-minutes: 15
      retention:
        terminal-operation-days: 90
        expired-session-days: 30
        audit-event-days: 365
        cleanup-interval-seconds: 300
        batch-size: 100
    query:
      maximum-page-size: 100
    tool:
      timeout-millis: 30000
      maximum-concurrent-calls: 4
    result:
      maximum-items: 100
      maximum-bytes: 65536

  server:
    path-prefix: /api/v1

server:
  port: 8080
  address: 0.0.0.0

  compression:
    enabled: true
    mime-types: application/javascript,application/json,application/xml,text/html,text/xml,text/plain,text/css,image/*
